<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>crabble 🦀 — Draw &amp; Guess 画画猜词</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦀</text></svg>">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ═══════════ JOIN SCREEN ═══════════ -->
<section id="screen-join" class="screen">
  <div class="join-wrap">
    <h1 class="logo">crabble 🦀</h1>
    <p class="tagline">Draw &amp; Guess! 画画猜词!</p>

    <div class="card" id="join-card">
      <label for="nickname">Your name 你的名字</label>
      <input id="nickname" maxlength="12" autocomplete="off" placeholder="e.g. Mei">

      <label>Pick an avatar 选择头像</label>
      <div id="avatar-grid" class="avatar-grid"></div>

      <div class="join-row">
        <input id="room-code" maxlength="4" autocomplete="off" placeholder="CODE 房间码" class="code-input">
        <button id="btn-join" class="btn btn-primary">Join! 加入!</button>
      </div>
      <div class="divider">or 或者</div>
      <button id="btn-show-create" class="btn btn-secondary">Create a room 创建房间</button>
      <p id="join-error" class="error-msg" hidden></p>
    </div>

    <!-- CREATE ROOM PANEL -->
    <div class="card hidden" id="create-card">
      <h2>Room settings 房间设置</h2>
      <div class="settings-row">
        <label>Rounds 轮数
          <select id="set-rounds">
            <option>1</option><option>2</option><option selected>3</option>
            <option>4</option><option>5</option>
          </select>
        </label>
        <label>Draw time 画画时间
          <select id="set-drawtime">
            <option value="45">45s</option>
            <option value="60">60s</option>
            <option value="80" selected>80s</option>
            <option value="100">100s</option>
            <option value="120">120s</option>
          </select>
        </label>
      </div>

      <label>Word categories 词库分类</label>
      <div id="category-grid" class="category-grid"></div>

      <label for="custom-words">Your own words 自定义词语 <span class="hint-text">(optional 可选)</span></label>
      <textarea id="custom-words" rows="4" placeholder="one per line 每行一个词:&#10;english,中文&#10;english,中文,pinyin&#10;e.g.  ruler,尺子"></textarea>
      <p id="custom-preview" class="hint-text"></p>

      <div class="join-row">
        <button id="btn-back" class="btn btn-secondary">← Back 返回</button>
        <button id="btn-create" class="btn btn-primary">Create! 创建!</button>
      </div>
      <p id="create-error" class="error-msg" hidden></p>
    </div>
  </div>
</section>

<!-- ═══════════ LOBBY SCREEN ═══════════ -->
<section id="screen-lobby" class="screen hidden">
  <div class="join-wrap">
    <h1 class="logo">crabble 🦀</h1>
    <div class="card">
      <h2>Room 房间: <span id="lobby-code" class="room-code-label"></span></h2>
      <button id="btn-copy" class="btn btn-secondary">📋 Copy invite link 复制邀请链接</button>
      <label>Players 玩家 (<span id="lobby-count">0</span>/16)</label>
      <div id="lobby-players" class="lobby-players"></div>
      <button id="btn-start" class="btn btn-primary btn-big hidden">Start! 开始! 🚀</button>
      <p id="lobby-wait" class="hint-text center">Waiting for the host to start… 等待房主开始…</p>
    </div>
  </div>
</section>

<!-- ═══════════ GAME SCREEN ═══════════ -->
<section id="screen-game" class="screen hidden">
  <header id="game-header">
    <div id="round-label">Round 1/3 第1轮</div>
    <div id="timer">⏱ --</div>
    <div id="hint-bar" class="hint-bar"></div>
    <button id="btn-settings" class="tool-btn hidden" title="Settings 设置">⚙️</button>
    <div id="brand">crabble 🦀</div>
  </header>

  <div id="settings-pop" class="settings-pop hidden">
    <h3>Game settings 游戏设置</h3>
    <label>Draw time 画画时间
      <select id="game-drawtime">
        <option value="45">45s</option>
        <option value="60">60s</option>
        <option value="80">80s</option>
        <option value="100">100s</option>
        <option value="120">120s</option>
      </select>
    </label>
    <label>Rounds 轮数
      <select id="game-rounds">
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option>
      </select>
    </label>
    <p class="hint-text">Changes apply from the next turn 下一回合生效</p>
    <button id="btn-apply-settings" class="btn btn-primary">Apply 应用</button>
  </div>

  <aside id="players-panel"></aside>

  <main id="canvas-area">
    <div id="canvas-box">
      <canvas id="canvas" width="800" height="600"></canvas>
      <div id="overlay" class="overlay hidden"></div>
    </div>
    <div id="toolbar" class="toolbar hidden">
      <div id="palette" class="palette"></div>
      <div id="sizes" class="sizes"></div>
      <button id="tool-eraser" class="tool-btn" title="Eraser 橡皮擦">🧽</button>
      <button id="tool-undo" class="tool-btn" title="Undo 撤销">↩️</button>
      <button id="tool-clear" class="tool-btn" title="Clear 清空">🗑️</button>
    </div>
  </main>

  <aside id="chat-panel">
    <div id="chat-log"></div>
    <form id="guess-form" autocomplete="off">
      <input id="guess-input" maxlength="100" placeholder="Guess! 猜一猜!" autocomplete="off">
      <button type="submit" class="btn btn-primary">➤</button>
    </form>
  </aside>
</section>

<script src="/socket.io/socket.io.js"></script>
<script type="module" src="/js/main.js"></script>
</body>
</html>
